name: Deploy to Home Server

# ── 트리거 ─────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main        # main 브랜치에 푸시될 때 자동 배포
  workflow_dispatch: # GitHub UI에서 수동 배포 가능

# ── 환경 변수 ──────────────────────────────────────────────────────
env:
  DEPLOY_DIR: ~/autotrading    # 홈서버 배포 경로 (유저 홈 디렉터리)

jobs:
  # ── Job 1: 테스트 및 빌드 검증 ─────────────────────────────────
  validate:
    name: Validate Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Check Python syntax
        run: python -m py_compile backend/main.py backend/config.py

  # ── Job 2: 홈서버 배포 ─────────────────────────────────────────
  deploy:
    name: Deploy to Home Server
    runs-on: ubuntu-latest
    needs: validate      # validate 성공 시에만 배포 진행
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # sshpass 설치 + known_hosts 등록 (비밀번호 방식 SSH)
      # GitHub Secrets 필요:
      #   SERVER_HOST     : 홈서버 IP 또는 도메인
      #   SERVER_USER     : SSH 로그인 유저명
      #   SERVER_PASSWORD : SSH 로그인 비밀번호
      - name: Set up SSH (password)
        run: |
          sudo apt-get install -y sshpass
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      # 코드를 홈서버로 전송 (git pull 방식)
      - name: Sync code to server
        run: |
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
              set -e
              if [ ! -d '${{ env.DEPLOY_DIR }}' ]; then
                echo '== 최초 배포: 디렉터리 생성 =='
                mkdir -p ${{ env.DEPLOY_DIR }}
                cd ${{ env.DEPLOY_DIR }}
                git clone ${{ github.server_url }}/${{ github.repository }} .
              else
                echo '== 코드 업데이트 =='
                cd ${{ env.DEPLOY_DIR }}
                git fetch origin
                git reset --hard origin/main
              fi
            "

      # GitHub Secrets에서 .env 파일 내용을 홈서버에 파일로 생성
      # GitHub Secrets 등록:
      #   ENV_FILE      : .env 파일 전체 내용
      #   ENV_PROD_FILE : .env.prod 파일 전체 내용
      - name: Write env files to server
        run: |
          printf '%s' "${{ secrets.ENV_FILE }}" | \
            sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cat > ${{ env.DEPLOY_DIR }}/.env && chmod 600 ${{ env.DEPLOY_DIR }}/.env"

          printf '%s' "${{ secrets.ENV_PROD_FILE }}" | \
            sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cat > ${{ env.DEPLOY_DIR }}/.env.prod && chmod 600 ${{ env.DEPLOY_DIR }}/.env.prod"

          echo '== .env 파일 배포 완료 =='

      # 기존 컨테이너 이미지 백업 (롤백용)
      - name: Backup current container state
        run: |
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
              cd ${{ env.DEPLOY_DIR }}
              if docker ps -q --filter name=autotrading-backend | grep -q .; then
                docker tag autotrading-backend:latest autotrading-backend:rollback 2>/dev/null || true
                docker tag autotrading-frontend:latest autotrading-frontend:rollback 2>/dev/null || true
                echo '== 롤백 이미지 저장 완료 =='
              fi
            "

      # Docker 이미지 빌드 및 서비스 재시작
      - name: Build and restart services
        run: |
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
              set -e
              cd ${{ env.DEPLOY_DIR }}
              echo '== Docker 이미지 빌드 시작 =='
              docker compose build --no-cache --parallel
              echo '== 서비스 재시작 =='
              docker compose up -d --remove-orphans
              echo '== 미사용 이미지 정리 =='
              docker image prune -f
            "

      # 배포 결과 헬스체크
      - name: Health check
        run: |
          echo '== 헬스체크 대기 중 (60초) =='
          sleep 60

          BACKEND_STATUS=$(sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "curl -sf http://localhost:8000/api/health | python3 -c \"import sys,json; d=json.load(sys.stdin); print(d['status'])\" 2>/dev/null || echo 'error'")

          FRONTEND_STATUS=$(sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "curl -sf http://localhost/health 2>/dev/null || echo 'error'")

          echo "백엔드 상태: $BACKEND_STATUS"
          echo "프론트엔드 상태: $FRONTEND_STATUS"

          if [ "$BACKEND_STATUS" != "ok" ] && [ "$BACKEND_STATUS" != "degraded" ]; then
            echo '❌ 백엔드 헬스체크 실패 — 롤백 시작'
            exit 1
          fi

          if [ "$FRONTEND_STATUS" != "OK" ]; then
            echo '❌ 프론트엔드 헬스체크 실패 — 롤백 시작'
            exit 1
          fi

          echo '✅ 배포 성공!'

      # 헬스체크 실패 시 자동 롤백
      - name: Rollback on failure
        if: failure()
        run: |
          sshpass -p "${{ secrets.SERVER_PASSWORD }}" \
            ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} "
              cd ${{ env.DEPLOY_DIR }}
              echo '== 롤백 시작 =='
              docker tag autotrading-backend:rollback autotrading-backend:latest 2>/dev/null || true
              docker tag autotrading-frontend:rollback autotrading-frontend:latest 2>/dev/null || true
              git stash 2>/dev/null || true
              docker compose up -d
              echo '== 롤백 완료 =='
            "

      # Telegram 배포 결과 알림
      - name: Notify deployment result
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            MESSAGE="✅ <b>배포 완료</b>%0A브랜치: ${{ github.ref_name }}%0A커밋: ${{ github.event.head_commit.message }}%0A시간: $(date '+%Y-%m-%d %H:%M KST')"
          else
            MESSAGE="❌ <b>배포 실패</b>%0A브랜치: ${{ github.ref_name }}%0A커밋: ${{ github.event.head_commit.message }}%0A자동 롤백이 시도되었습니다."
          fi

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=${MESSAGE}" \
            -d "parse_mode=HTML" || true
